  <script type="module">
    (async () => {
      const anime = await import('https://cdn.jsdelivr.net/npm/animejs@4.0.0/lib/anime.esm.js');
      const { createTimeline, stagger } = anime;

      const tl = createTimeline({ defaults: { ease: 'out(2)' } });

      // 1. testo-uno (lettera per lettera)
      tl.add('#testo-uno path', {
        opacity: { to: 1, duration: 40 },
        delay: stagger(60)
      }, 0);

      // 2. testo-due (lettera per lettera) dopo testo-uno
      tl.add('#testo-due path', {
        opacity: { to: 1, duration: 40 },
        delay: stagger(60)
      }, '>-0');

      // 3. tutti gli altri path stroke (incluso testo-soluzione & linea-scoperto)
      const strokePaths = Array.from(document.querySelectorAll('path[stroke]')).filter(p => {
        return !p.closest('#testo-uno') && !p.closest('#testo-due');
      });

      // ordina dall'alto verso il basso per coordinata Y
      strokePaths.sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);

      tl.add(strokePaths, {
        opacity: { to: 1, duration: 600 },
        delay: stagger(30)
      }, '>');
    })();
  </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const texts = document.querySelectorAll('.text');
const decos = document.querySelectorAll('.deco');
const decosLate = document.querySelectorAll('.deco-late');
const motionPathEl = document.getElementById('motion-path-el');

function createMotionPath(path, offset) {
  const total = path.getTotalLength();
  const len = Math.max(0, Math.min(offset, total));
  const pt = path.getPointAtLength(len);
  const prev = path.getPointAtLength(Math.max(0, len - 1));
  const angle = Math.atan2(pt.y - prev.y, pt.x - prev.x) * 180 / Math.PI;
  return { translateX: pt.x, translateY: pt.y, rotate: angle };
}

// stagger text
texts.forEach((el, i) => {
  el.style.animationDelay = (i * 0.025 + 0.5) + 's';
});

const lastTextEnd = (texts.length - 1) * 0.025 + 0.5 + 0.6;
gsap.set([...decos, ...decosLate], { opacity: 0, scale: 0.8 });

// Early deco: appear then loop along motion path
const pathTotal = motionPathEl.getTotalLength();
decos.forEach((el, i) => {
  const t = (i + 1) / (decos.length + 1);
  const startPos = createMotionPath(motionPathEl, t * pathTotal);
  
  // Appear
  gsap.set(el, { x: startPos.translateX, y: startPos.translateY, rotation: startPos.rotate });
  gsap.to(el, {
    opacity: 1,
    scale: 1,
    duration: 0.8,
    delay: lastTextEnd + i * 0.012,
    ease: 'power2.out'
  });
  
  // Loop along the path
  gsap.to(el, {
    motionPath: {
      path: motionPathEl,
      start: t,
      end: t + 1,
      autoRotate: true
    },
    duration: 6 + Math.random() * 4,
    repeat: -1,
    ease: 'none',
    delay: lastTextEnd + decos.length * 0.012 + 0.5
  });
});

// Late deco (bottom 4): appear then gentle float loop
gsap.to(decosLate, {
  opacity: 1,
  scale: 1,
  duration: 0.6,
  stagger: 0.15,
  delay: lastTextEnd + decos.length * 0.012 + 0.5,
  ease: 'power2.out',
  onComplete: () => {
    decosLate.forEach(el => {
      gsap.to(el, {
        y: '+=15',
        duration: 2 + Math.random() * 1.5,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut'
      });
    });
  }
});
</script>
